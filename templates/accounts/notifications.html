{% extends "base.html" %}

{% block content %}

<h2 style="padding:20px;">🔔 Notifications</h2>

<div style="width:70%; margin:auto;">

    {% for n in notifications %}
        <div style="background:#f5f5f5; padding:15px; margin-bottom:10px; border-radius:8px;">
            <p>{{ n.message }}</p>
            <small style="color:gray;">{{ n.created_at }}</small>
        </div>
    {% empty %}
        <p>No notifications yet.</p>
    {% endfor %}

</div>

{% endblock %}
