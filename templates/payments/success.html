{% extends "base.html" %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  .pay-page {
    font-family: 'Sora', sans-serif;
    min-height: 88vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
    background:
      radial-gradient(ellipse 70% 60% at 50% -10%, rgba(34,197,94,.10) 0%, transparent 70%),
      linear-gradient(160deg, #f0fdf4 0%, #f8fafc 50%, #eff6ff 100%);
    position: relative;
    overflow: hidden;
  }

  /* subtle dot-grid texture */
  .pay-page::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: .30;
    pointer-events: none;
  }

  .pay-card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,.9);
    border-radius: 24px;
    box-shadow:
      0 4px 6px rgba(0,0,0,.04),
      0 20px 60px rgba(0,0,0,.09),
      0 0 0 1px rgba(34,197,94,.08);
    padding: 56px 48px 48px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    animation: cardIn .55s cubic-bezier(.22,.68,0,1.2) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(28px) scale(.97); }
    to   { opacity: 1; transform: translateY(0)   scale(1);    }
  }

  /* ── Icon ── */
  .pay-icon-ring {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 28px;
    position: relative;
    animation: popIn .5s .25s cubic-bezier(.22,.68,0,1.3) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(.5); }
    to   { opacity: 1; transform: scale(1);  }
  }

  .pay-icon-ring::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid rgba(34,197,94,.20);
    animation: pulse 2.4s ease-in-out 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1);   opacity: 1; }
    50%       { transform: scale(1.1); opacity: 0; }
  }

  .pay-icon-ring svg {
    width: 40px; height: 40px;
    stroke: #16a34a;
    stroke-width: 2.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* checkmark draw animation */
  .pay-icon-ring svg path {
    stroke-dasharray: 60;
    stroke-dashoffset: 60;
    animation: draw .5s .55s ease forwards;
  }

  @keyframes draw {
    to { stroke-dashoffset: 0; }
  }

  /* ── Text ── */
  .pay-card .pay-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .09em;
    text-transform: uppercase;
    color: #16a34a;
    background: #dcfce7;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  .pay-card h1 {
    font-size: 26px;
    font-weight: 700;
    color: #0f172a;
    line-height: 1.2;
    margin-bottom: 14px;
    letter-spacing: -.02em;
  }

  .pay-card p {
    font-size: 14.5px;
    color: #64748b;
    line-height: 1.7;
    max-width: 360px;
    margin: 0 auto 32px;
  }

  .pay-card p strong {
    color: #0f172a;
    font-weight: 600;
  }

  /* ── Divider ── */
  .pay-divider {
    width: 48px;
    height: 3px;
    border-radius: 99px;
    background: linear-gradient(90deg, #22c55e, #4ade80);
    margin: 0 auto 28px;
  }

  /* ── Buttons ── */
  .pay-btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
    color: #fff;
    text-decoration: none;
    padding: 13px 30px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: .01em;
    box-shadow: 0 4px 16px rgba(37,99,235,.35);
    transition: transform .18s ease, box-shadow .18s ease;
  }

  .pay-btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(37,99,235,.45);
    color: #fff;
    text-decoration: none;
  }

  .pay-btn-primary svg {
    width: 16px; height: 16px;
    stroke: currentColor; fill: none;
    stroke-width: 2.2;
    stroke-linecap: round; stroke-linejoin: round;
  }

  /* ── Footer note ── */
  .pay-footnote {
    margin-top: 24px;
    font-size: 12px;
    color: #94a3b8;
  }

  @media (max-width: 520px) {
    .pay-card { padding: 40px 24px 36px; }
    .pay-card h1 { font-size: 22px; }
  }
</style>

<div class="pay-page">
  <div class="pay-card">

    <!-- Icon -->
    <div class="pay-icon-ring">
      <svg viewBox="0 0 24 24">
        <path d="M5 13l4 4L19 7"/>
      </svg>
    </div>

    <!-- Status badge -->
    <div class="pay-status">
      <!-- dot -->
      <svg width="7" height="7" viewBox="0 0 7 7" fill="#16a34a"><circle cx="3.5" cy="3.5" r="3.5"/></svg>
      Confirmed
    </div>

    <h1>Payment Successful 🎉</h1>

    <div class="pay-divider"></div>

    <p>
      Your payment has been completed successfully.<br>
      Your job posting is now <strong>live</strong> and visible to applicants.
    </p>

    <a href="{% url 'home' %}" class="pay-btn-primary">
      <svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg>
      Go to Homepage
    </a>

    <p class="pay-footnote">A confirmation has been recorded. Thank you for using Pocket Job.</p>

  </div>
</div>

{% endblock %}
