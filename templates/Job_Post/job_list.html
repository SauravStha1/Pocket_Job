{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>My Posted Jobs | Pocket Job</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .job-container {
            max-width: 900px;
            margin: auto;
        }

        .job-card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .actions {
            margin-top: 10px;
        }

        .btn {
            padding: 6px 12px;
            border-radius: 5px;
            text-decoration: none;
            margin-right: 6px;
            font-size: 14px;
        }

        .btn-view { background: #28a745; color: white; }
        .btn-edit { background: #ffc107; color: black; }
        .btn-delete { background: #dc3545; color: white; }
        .btn-app { background: #6f42c1; color: white; }
    </style>
</head>
<body>

<h2>My Posted Jobs</h2>

<div class="job-container">

{% for job in jobs %}
<div class="job-card">

    <h3>{{ job.title }}</h3>
    <p>{{ job.job_type }} | {{ job.location }}</p>

    <div class="actions">
        <a href="{% url 'job_detail' job.id %}" class="btn btn-view">View</a>

        <a href="{% url 'job_edit' job.id %}" class="btn btn-edit">Edit</a>

        <a href="{% url 'job_delete' job.id %}"
           class="btn btn-delete"
           onclick="return confirm('Delete this job?');">
           Delete
        </a>

        <a href="{% url 'job_applicants' job.id %}" class="btn btn-app">
            Applicants
        </a>
    </div>

</div>
{% empty %}
<p>No jobs posted yet.</p>
{% endfor %}

</div>

</body>
</html>
